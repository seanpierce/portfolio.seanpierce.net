name: Deploy to Server

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build (minify with esbuild)
        run: |
          npm install esbuild

          npx esbuild assets/scripts/scripts.js \
            --minify \
            --outfile=assets/scripts/scripts.js

          npx esbuild assets/scripts/dots.js \
            --minify \
            --outfile=assets/scripts/dots.js

          npx esbuild assets/styles/index.css \
            --minify \
            --outfile=assets/styles/index.css

      - name: Inject cache bust
        run: |
          VERSION=${GITHUB_SHA}

          sed -i "s|scripts.js|scripts.js?v=$VERSION|g" index.html
          sed -i "s|dots.js|dots.js?v=$VERSION|g" index.html
          sed -i "s|index.css|index.css?v=$VERSION|g" index.html

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy (no git pull)
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/id_ed25519" \
            ./ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:~/www/portfolio.seanpierce.net